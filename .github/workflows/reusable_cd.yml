# flutter_toolbox/.github/workflows/reusable_cd.yml
name: Reusable CD

on:
    workflow_call:
        inputs:
            flutter_version:
                type: string
                default: "3.22.x"
            working_directory:
                type: string
                default: "."
            environment:
                description: Deployment environment (staging, production)
                type: string
                required: true
            flavor:
                type: string
                default: ""
            dart_define:
                type: string
                default: ""
            run_build_runner:
                type: boolean
                default: false
            deploy_to_play_store:
                description: Upload AAB to Google Play Store internal track
                type: boolean
                default: false
            deploy_to_app_store:
                description: Upload IPA to TestFlight
                type: boolean
                default: false
            bump_version:
                description: Auto bump build number using run number
                type: boolean
                default: true

        secrets:
            KEYSTORE_BASE64:
                description: Base64 encoded Android keystore
                required: false
            KEYSTORE_PASSWORD:
                required: false
            KEY_ALIAS:
                required: false
            KEY_PASSWORD:
                required: false
            GOOGLE_SERVICES_JSON:
                required: false
            GOOGLE_SERVICE_INFO_PLIST:
                required: false
            PLAY_STORE_SERVICE_ACCOUNT_JSON:
                description: Google Play service account JSON for upload
                required: false
            APP_STORE_CONNECT_API_KEY:
                description: App Store Connect API key (base64)
                required: false
            APP_STORE_CONNECT_API_KEY_ID:
                required: false
            APP_STORE_CONNECT_ISSUER_ID:
                required: false

jobs:
    # ── Android CD ─────────────────────────────────────────────────────────────
    android_cd:
        name: Android — ${{ inputs.environment }}
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment }}

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: "zulu"
                  java-version: "17"

            - uses: subosito/flutter-action@v2
              with:
                  flutter-version: ${{ inputs.flutter_version }}
                  cache: true

            - name: Inject google-services.json
              if: ${{ env.GOOGLE_SERVICES_JSON != '' }}
              env:
                  GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON}}
              run: |
                  echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode \
                    > ${{ inputs.working_directory }}/android/app/google-services.json

            - name: Inject keystore
              if: ${{ env.KEYSTORE_BASE64 != '' }}
              env:
                  KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64}}
              run: |
                  echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
                    > ${{ inputs.working_directory }}/android/app/keystore.jks
                  cat <<EOF > ${{ inputs.working_directory }}/android/key.properties
                  storePassword=${{ secrets.KEYSTORE_PASSWORD }}
                  keyPassword=${{ secrets.KEY_PASSWORD }}
                  keyAlias=${{ secrets.KEY_ALIAS }}
                  storeFile=keystore.jks
                  EOF

            - name: Get dependencies
              working-directory: ${{ inputs.working_directory }}
              run: flutter pub get

            - name: Run build_runner
              if: ${{ inputs.run_build_runner }}
              working-directory: ${{ inputs.working_directory }}
              run: flutter pub run build_runner build --delete-conflicting-outputs

            - name: Bump build number
              if: ${{ inputs.bump_version }}
              working-directory: ${{ inputs.working_directory }}
              run: |
                  # Replaces build number with GitHub run number for unique builds
                  sed -i "s/^version: \(.*\)+.*/version: \1+${{ github.run_number }}/" pubspec.yaml

            - name: Build AAB
              working-directory: ${{ inputs.working_directory }}
              run: |
                  flutter build appbundle --release \
                    ${{ inputs.flavor != '' && format('--flavor {0}', inputs.flavor) || '' }} \
                    ${{ inputs.dart_define != '' && format('--dart-define={0}', inputs.dart_define) || '' }}

            - name: Upload AAB artifact
              uses: actions/upload-artifact@v4
              with:
                  name: release-aab-${{ inputs.environment }}
                  path: ${{ inputs.working_directory }}/build/app/outputs/bundle/release/app-release.aab

            - name: Deploy to Play Store
              if: ${{ inputs.deploy_to_play_store && env.PLAY_STORE_SERVICE_ACCOUNT_JSON != '' }}
              env:
                  PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON}}
              uses: r0adkll/upload-google-play@v1
              with:
                  serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
                  packageName: com.example.app # app overrides this via env var
                  releaseFiles: ${{ inputs.working_directory }}/build/app/outputs/bundle/release/app-release.aab
                  track: internal

    # ── iOS CD ─────────────────────────────────────────────────────────────────
    ios_cd:
        name: iOS — ${{ inputs.environment }}
        runs-on: macos-latest
        environment: ${{ inputs.environment }}
        if: ${{ inputs.deploy_to_app_store }}

        steps:
            - uses: actions/checkout@v4

            - uses: subosito/flutter-action@v2
              with:
                  flutter-version: ${{ inputs.flutter_version }}
                  cache: true

            - name: Inject GoogleService-Info.plist
              if: ${{ env.GOOGLE_SERVICE_INFO_PLIST != '' }}
              env:
                  GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST}}
              run: |
                  echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode \
                    > ${{ inputs.working_directory }}/ios/Runner/GoogleService-Info.plist

            - name: Get dependencies
              working-directory: ${{ inputs.working_directory }}
              run: flutter pub get

            - name: Bump build number
              if: ${{ inputs.bump_version }}
              working-directory: ${{ inputs.working_directory }}
              run: |
                  sed -i '' "s/^version: \(.*\)+.*/version: \1+${{ github.run_number }}/" pubspec.yaml

            - name: Build IPA
              working-directory: ${{ inputs.working_directory }}
              run: |
                  flutter build ipa --release \
                    ${{ inputs.flavor != '' && format('--flavor {0}', inputs.flavor) || '' }} \
                    ${{ inputs.dart_define != '' && format('--dart-define={0}', inputs.dart_define) || '' }}

            - name: Upload to TestFlight
              if: ${{ env.APP_STORE_CONNECT_API_KEY != '' }}
              env:
                  APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY}}
              run: |
                  echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" | base64 --decode \
                  > AuthKey.p8 xcrun altool --upload-app \
                  --type ios \
                  --file "${{ inputs.working_directory }}/build/ios/ipa/*.ipa" \
                  --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
                  --apiIssuer "${{secrets.APP_STORE_CONNECT_ISSUER_ID }}"
